services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: stt-translation-app
    ports:
      - "8000:8000"
    environment:
      # Ollama is now on the same host (AI host)
      # host.docker.internal allows container to access host's Ollama service
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # FORCE override model to avoid OOM
      - OLLAMA_MODEL=gpt-oss:20b
      # Enable GPU for Faster Whisper and LayoutParser
      - FORCE_CPU=false
      # ── PDF Parallel Pages ─────────────────────────────────────────────────
      # Number of PDF pages to process simultaneously.
      # Each page opens its own fitz.Document (thread-safe) and saves a temp PDF;
      # results are merged in order at the end.
      # A40 (48 GB VRAM) comfortably handles 2 concurrent pages + YOLO + Whisper.
      - PDF_PARALLEL_PAGES=2
      # ── NOTE: Ollama runs on the HOST, not in this container. ──────────────
      # To enable parallel LLM calls, set on the HOST before starting Ollama:
      #   export OLLAMA_NUM_PARALLEL=3   (A40 48 GB can handle 3x gpt-oss:20b)
      #   sudo systemctl restart ollama
      # OR if Ollama is managed via another docker-compose, add to its env:
      #   OLLAMA_NUM_PARALLEL=3
    volumes:
      - ./backend/app:/app/app
    restart: always
    # Enable host.docker.internal on Linux (Windows/Mac already support it)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Enable GPU support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

