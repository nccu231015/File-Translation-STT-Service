services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: stt-translation-app
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
      # Ollama is now on the same host (AI host)
      # host.docker.internal allows container to access host's Ollama service
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # Per API request options (sent from this container to host Ollama). Does NOT change ollama.service on the host.
      - OLLAMA_NUM_CTX=4096
      - OLLAMA_TRANSLATE_MAX_PARALLEL=20
      # Use Qwen3 for better performance/VRAM balance
      - OLLAMA_MODEL=qwen3:latest
      - OLLAMA_ANALYSIS_MODEL=qwen3:latest
      - OLLAMA_TRANSLATION_MODEL=qwen3:latest
      # Enable GPU for Faster Whisper and LayoutParser
      - FORCE_CPU=false
      # ── PDF Parallel Pages ─────────────────────────────────────────────────
      # Number of PDF pages to process simultaneously.
      # Each page opens its own fitz.Document (thread-safe) and saves a temp PDF;
      # results are merged in order at the end.
      # A40 (48 GB VRAM) comfortably handles 2 concurrent pages + YOLO + Whisper.
      - PDF_PARALLEL_PAGES=10
      # ── NOTE: Ollama runs on the HOST, not in this container. ──────────────
      # EXTREME MODE: Optimized for 48GB VRAM (A40/A6000)
      #   export OLLAMA_NUM_PARALLEL=16  (Handle 16 simultaneous requests)
      #   export OLLAMA_MAX_LOADED_MODELS=3
      #   sudo systemctl restart ollama
    volumes:
      - ./backend/app:/app/app
    restart: always
    # Enable host.docker.internal on Linux (Windows/Mac already support it)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Enable GPU support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  redis:
    image: redis:7-alpine
    container_name: stt-redis
    ports:
      - "6379:6379"
    restart: always
    command: redis-server --save 60 1 --loglevel warning

