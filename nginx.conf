user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Backend API Server (HTTPS mapping to Port 8000)
    server {
        listen 8000 ssl;
        server_name _; 

        ssl_certificate /etc/nginx/certs/server-fullchain.crt;
        ssl_certificate_key /etc/nginx/certs/serverv.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://host.docker.internal:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Extended timeouts for Long running AI tasks
            proxy_read_timeout 600s;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            
            # Max upload size for large PDFs and Audio files
            client_max_body_size 500M;
        }
    }

    # Frontend Server (HTTPS on Port 443 / HTTP redirect)
    server {
        listen 80;
        server_name _; 
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _; 

        # Wildcard certificates
        ssl_certificate /etc/nginx/certs/server-fullchain.crt;
        ssl_certificate_key /etc/nginx/certs/serverv.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Dedicated route for Smart Q&A
        location /factory-chat {
            proxy_pass http://host.docker.internal:8001; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            
            # AI analysis can be slow, extend read timeout
            proxy_read_timeout 600s;
        }

        location / {
            # Frontend Next.js server
            proxy_pass http://host.docker.internal:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
